# Runfile | https://crates.io/crates/runnables-cli

[dev-core]
alias = "dc"
description = "runs core --release"
cmd = "cargo run -p cicada_core --release"

[dev-periphery]
alias = "dp"
description = "runs periphery --release"
cmd = "cargo run -p cicada_periphery --release"

[dev-frontend]
alias = "df"
path = "frontend"
cmd = "npm run dev"

[npm-install]
description = "downloads latest javacript dependencies for client and frontend"
cmd = """
cd client/ts && npm
"""

[gen-client]
alias = "gc"
description = "generates typescript types and build the ts client"
after = "npm-install"
cmd = """
node ./client/ts/generate_types.mjs && \
cd ./client/ts && npm run build"""

