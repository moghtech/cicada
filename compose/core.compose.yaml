services:

  cicada-core:
    image: ghcr.io/moghtech/cicada-core
    restart: unless-stopped
    ports:
      - 9220:9220
    volumes:
      # Store the auto generated key pair
      - keys:/config/keys
      # Store database files
      - database:/database
    environment:
      CICADA_TITLE: Cicada
      CICADA_HOST: https://cicada.example.com
      CICADA_DATABASE_URI: rocksdb:/database
      CICADA_LOCAL_AUTH: true
      CICADA_DISABLE_USER_REGISTRATION: false

volumes:
  keys:
  database:
