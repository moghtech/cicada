services:

  cicada-periphery:
    image: ghcr.io/moghtech/cicada-periphery
    restart: unless-stopped
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      # Install the apparmor profile before starting. It persists on reboots:
      #   sudo cp ./apparmor-docker-cicada /etc/apparmor.d/docker-cicada
      #   sudo apparmor_parser -r -W /etc/apparmor.d/docker-cicada
      - apparmor:docker-cicada
    volumes:
      # Store the auto generated key pair
      - keys:/config/keys
      # Use 'rshared' so FUSE mounts are visible to the host / other containers
      - /cicada:/cicada:rshared
      # Optional: Mount an additional root CA for trust
      # - /path/to/root_ca.crt:/usr/local/share/ca-certificates/root_ca.crt
    environment:
      CICADA_CORE_ADDRESS: https://cicada.example.com
      CICADA_FILESYSTEMS: "my-filesystem|rw=true"
      CICADA_ALLOW_UIDS: 1000
      CICADA_ONBOARDING_KEY: my-onboarding-key
      CICADA_DEVICE_NAME: my-device-name
    # Let containers know when filesystem is ready through health check
    healthcheck:
      test: ["CMD", "mountpoint", "-q", "/cicada/my-filesystem"]
      start_period: 10s
      start_interval: 1s
      interval: 30s
      timeout: 1s
      retries: 3

volumes:
  keys: