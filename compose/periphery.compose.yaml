services:

  cicada-periphery:
    image: ghcr.io/moghtech/cicada-periphery
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    volumes:
      # Persist communication keys
      - keys:/config/keys
      # Mount the fuse directory
      - /cicada:/cicada:rshared
      # Optional: Mount an additional root CA for trust
      # - /path/to/root_ca.crt:/usr/local/share/ca-certificates/root_ca.crt
    environment:
      CICADA_CORE_ADDRESS: https://cicada.example.com
      CICADA_FILESYSTEMS: "my-filesystem|rw=true"
      CICADA_ALLOW_UIDS: 1000
      CICADA_ONBOARDING_KEY: my-onboarding-key
      CICADA_DEVICE_NAME: my-device-name
    # Let containers know when filesystem is ready through health check
    healthcheck:
      test: ["CMD", "mountpoint", "-q", "/cicada/my-filesystem"]
      start_period: 10s
      start_interval: 1s
      interval: 30s
      timeout: 1s
      retries: 3

volumes:
  keys: