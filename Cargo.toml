[workspace]
resolver = "2"
members = [
	"bin/*",
	"lib/*",
	"client/rs",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["mbecker20 <becker.maxh@gmail.com>"]
license = "GPL-3.0-or-later"
repository = "https://github.com/moghtech/cicada"
homepage = "https://mogh.tech/cicada"

[profile.release]
strip = "debuginfo"

[workspace.dependencies]
cicada_client = { path = "client/rs" }
environment_file = { path = "lib/environment_file" }
config = { path = "lib/config" }
logger = { path = "lib/logger" }

# MOGH
serror = { version = "0.5.4", default-features = false }
derive_default_builder = "0.1.8"
derive_empty_traits = "0.1.0"
partial_derive2 = "0.4.5"
derive_variants = "1.0.0"
resolver_api = "3.0.0"

# ASYNC
reqwest = { version = "0.12.28", default-features = false, features = ["json", "rustls-tls-native-roots"] }
tokio = { version = "1.48.0", features = ["full"] }
futures-util = "0.3.31"
arc-swap = "1.8.0"

# SERVER
tokio-tungstenite = { version = "0.28.0", features = ["rustls-tls-native-roots"] }
tower-http = { version = "0.6.8", features = ["fs", "cors", "set-header"] }
axum = { version = "0.8.8", features = ["ws", "json", "macros"] }
axum-extra = { version = "0.12.4", features = ["typed-header"] }
axum-server = { version = "0.8.0", features = ["tls-rustls"] }
tower-sessions = "0.14.0"

# OPENAPI
utoipa-scalar = { version = "0.3.0", features = ["axum"] }
utoipa = "5.4.0"

# SER/DE
serde = { version = "1.0.227", features = ["derive"] }
strum = { version = "0.27.2", features = ["derive"] }
serde_yaml_ng = "0.10.0"
serde_json = "1.0.148"
serde_qs = "0.15.0"
toml = "0.9.8"
url = "2.5.7"

# ERROR
anyhow = "1.0.100"
thiserror = "2.0.17"

# LOGGING
opentelemetry-otlp = { version = "0.31.0", features = ["tls-roots", "reqwest-rustls"] }
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio"] }
tracing-subscriber = { version = "0.3.22", features = ["json"] }
opentelemetry-semantic-conventions = "0.31.0"
tracing-opentelemetry = "0.32.0"
opentelemetry = "0.31.0"
tracing = "0.1.44"

# CONFIG
dotenvy = "0.15.7"
envy = "0.4.2"

# CRYPTO / AUTH
rustls = { version = "0.23.35", features = ["aws-lc-rs"] }

# DATABASE
surrealdb = { version = "3.0.0-beta.1", features = ["native-tls", "kv-tikv"] }
surrealdb-types = { version = "3.0.0-beta.1" }

# MISC
typeshare = "1.0.4"
indexmap = "2.12.1"
wildcard = "0.3.0"
colored = "3.0.0"
fuser = "0.16.0"
regex = "1.12.2"
libc = "0.2.178"